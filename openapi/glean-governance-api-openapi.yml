openapi: 3.1.0
info:
  title: Glean Client REST activity governance API
  version: 0.9.0
  description: 'Subset of Glean''s Client REST API. Glean exposes search, chat, agents,

    answers, announcements, collections, documents, people, summarize,

    insights, recommendations, tools, governance, and verification endpoints

    against the customer''s Glean instance.


    Derived from the public OpenAPI definition published at

    https://gleanwork.github.io/open-api/specs/final/client_rest.yaml

    '
  contact:
    name: Glean Developers
    url: https://developers.glean.com/
servers:
- url: https://{instance}-be.glean.com/rest/api/v1
  description: Glean customer instance
  variables:
    instance:
      default: customer
      description: Glean instance subdomain
security:
- bearerAuth: []
tags:
- name: governance
paths:
  /governance/data/policies:
    post:
      tags:
      - governance
      summary: Create a data governance policy
      operationId: createGovernancePolicy
      responses:
        '200':
          description: OK
  /governance/data/policies/{id}:
    get:
      tags:
      - governance
      summary: Get a governance policy
      operationId: getGovernancePolicy
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: OK
  /governance/data/reports:
    post:
      tags:
      - governance
      summary: Create a governance report
      operationId: createGovernanceReport
      responses:
        '200':
          description: OK
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: 'Glean API token, passed as `Authorization: Bearer <token>`'
